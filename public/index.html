<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>撲克數學對戰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-pattern"></div>

  <main class="app">
    <header class="header">
      <h1>🃏 撲克數學對戰</h1>
      <p class="subtitle">翻四張牌，用加減乘除湊出目標數字！</p>
    </header>

    <!-- 大廳 -->
    <section id="lobby" class="panel">
      <div class="form-group">
        <label for="playerName">你的暱稱</label>
        <input id="playerName" type="text" placeholder="輸入暱稱" maxlength="12" value="玩家" />
      </div>
      <div class="lobby-actions">
        <button id="btnCreate" class="btn btn-primary">建立房間</button>
        <div class="join-row">
          <input id="roomCode" type="text" placeholder="房間代碼" maxlength="4" class="code-input" />
          <button id="btnJoin" class="btn btn-secondary">加入房間</button>
        </div>
      </div>
      <p id="lobbyError" class="error hidden"></p>
      <div class="how-to">
        <h3>怎麼確保兩個人連線？</h3>
        <ol>
          <li>玩家 A 按「建立房間」，會得到 4 位房間代碼</li>
          <li>把代碼傳給玩家 B（訊息、口頭都行）</li>
          <li>玩家 B 輸入代碼按「加入房間」</li>
          <li>畫面顯示「兩位玩家已連線」就代表連上了！</li>
        </ol>
      </div>
    </section>

    <!-- 等待室 -->
    <section id="waiting" class="panel hidden">
      <div class="room-info">
        <span class="label">房間代碼</span>
        <span id="displayCode" class="room-code">----</span>
        <button id="btnCopy" class="btn btn-small">複製</button>
      </div>

      <div class="connection-status">
        <div class="status-card" id="slot1">
          <div class="avatar">1</div>
          <span class="player-name">等待中...</span>
          <span class="status-dot offline"></span>
        </div>
        <div class="vs">VS</div>
        <div class="status-card" id="slot2">
          <div class="avatar">2</div>
          <span class="player-name">等待中...</span>
          <span class="status-dot offline"></span>
        </div>
      </div>

      <p id="connectionMessage" class="connection-message">等待另一位玩家加入...</p>

      <button id="btnStart" class="btn btn-primary hidden" disabled>翻牌出題</button>
      <p id="hostHint" class="hint hidden">你是房主，等對手連線後可以出題</p>
    </section>

    <!-- 遊戲中 -->
    <section id="game" class="panel hidden">
      <div class="scoreboard">
        <div id="score1" class="score-item">玩家 1: 0</div>
        <div class="target-display">
          目標數字：<strong id="targetNumber">?</strong>
        </div>
        <div id="score2" class="score-item">玩家 2: 0</div>
      </div>

      <div class="cards-row" id="cardsRow"></div>

      <div class="answer-area">
        <p class="hint">用四張牌的數字各一次，輸入算式（例如 <code>(11-3)*(8/4)</code>）</p>
        <div class="answer-row">
          <input id="expression" type="text" placeholder="輸入你的算式..." />
          <button id="btnSubmit" class="btn btn-primary">送出答案</button>
        </div>
        <p id="answerFeedback" class="feedback hidden"></p>
      </div>

      <div id="roundResult" class="round-result hidden"></div>
      <button id="btnNextRound" class="btn btn-secondary hidden">下一題（房主）</button>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
